<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythos AI Command Center</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
background:#050505;
color:white;
display:flex;
overflow:hidden;
}

.sidebar{
width:280px;
background:#0d0d0d;
border-right:2px solid red;
padding:20px;
}

.logo{
font-size:28px;
font-weight:bold;
color:red;
text-align:center;
margin-bottom:20px;
}

.history-item{
padding:12px;
background:#111;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
}
 .chat-container{
flex:1;
display:flex;
flex-direction:column;
border-left:1px solid #222;
border-right:1px solid #222;
}

.chat-header{
height:70px;
border-bottom:2px solid red;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
padding:15px;
margin:10px 0;
border-radius:12px;
max-width:70%;
}

.user{
background:red;
margin-left:auto;
}

.ai{
background:#111;
border:1px solid #333;
  }
  .input-area{
padding:15px;
display:flex;
gap:10px;
border-top:2px solid red;
}

#prompt{
flex:1;
padding:14px;
border-radius:12px;
border:none;
background:#111;
color:white;
}

.btn{
padding:12px 18px;
background:red;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

.status-panel{
width:250px;
background:#0d0d0d;
border-left:2px solid red;
padding:20px;
}

.card{
background:#111;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}
</style>
</head>
<body>
  <div class="sidebar">
<div class="logo">MYTHOS AI</div>

<div class="history-item">New Chat</div>
<div class="history-item">History 1</div>
<div class="history-item">History 2</div>
</div>

<div class="chat-container">

<div class="chat-header">
⚡ AETHRON AI COMMAND CENTER
</div>

<div id="messages" class="messages">
<div class="message ai">
Welcome Commander 🚀
</div>
</div>

<div class="input-area">
<button class="btn" onclick="startVoice()">🎤</button>

<input
id="prompt"
placeholder="Type your command..."
>

<button class="btn" onclick="sendMessage()">
Send
</button>
</div>

</div>

<div class="status-panel">

<div class="card">
🟢 System Online
</div>

<div class="card">
🤖 AI Core Active
</div>

<div class="card">
⚡ Mythos Engine Ready
</div>

</div>
<script>

function addMessage(text,type){

const div=document.createElement("div");

div.className="message "+type;

div.innerText=text;

document
.getElementById("messages")
.appendChild(div);

}

async function sendMessage(){

const input=
document.getElementById("prompt");

const text=input.value.trim();

if(!text) return;

addMessage(text,"user");

input.value="";

try{

const res=await fetch(
"https://mythos-ai-1.onrender.com/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:"guest",
prompt:text,
token:"test",
plan:"free"
})
}
);

const data=await res.json();

addMessage(
data.response ||
JSON.stringify(data),
"ai"
);

}catch(err){

addMessage(
"Connection Error",
"ai"
);

}

}

function startVoice(){

const SpeechRecognition=
window.SpeechRecognition||
window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Voice not supported");
return;
}

const recognition=
new SpeechRecognition();

recognition.onresult=
function(event){

document
.getElementById("prompt")
.value=
event.results[0][0]
.transcript;

};

recognition.start();

}

</script>

</body>
</html>
