<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mythos ChatGPT Pro UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================= GLOBAL ================= */
body {
margin: 0;
font-family: Arial;
background: #0b0b0b;
color: white;
display: flex;
height: 100vh;
overflow: hidden;
}

/* ================= SIDEBAR ================= */
.sidebar {
width: 260px;
background: #111;
padding: 15px;
display: flex;
flex-direction: column;
}

.sidebar h2 {
margin: 0 0 10px;
}

.agent {
padding: 10px;
margin: 5px 0;
background: #1a1a1a;
border-radius: 8px;
cursor: pointer;
}

.agent:hover {
background: #333;
}

/* ================= CHAT ================= */
.chat {
flex: 1;
display: flex;
flex-direction: column;
}

.messages {
flex: 1;
padding: 15px;
overflow-y: auto;
}

.msg {
margin: 10px 0;
padding: 10px;
border-radius: 10px;
max-width: 70%;
}

.user {
background: #7c3aed;
margin-left: auto;
}

.ai {
background: #1a1a1a;
border: 1px solid #333;
}

/* typing animation */
.typing {
opacity: 0.6;
font-style: italic;
}

/* ================= INPUT BAR ================= */
.input-box {
display: flex;
padding: 10px;
background: #111;
gap: 10px;
}

input {
flex: 1;
padding: 10px;
border-radius: 8px;
border: none;
background: #1a1a1a;
color: white;
}

/* buttons */
button {
padding: 10px;
border: none;
border-radius: 8px;
background: #7c3aed;
color: white;
cursor: pointer;
}

/* ================= RIGHT PANEL ================= */
.right {
width: 220px;
background: #111;
padding: 10px;
}

.card {
background: #1a1a1a;
padding: 10px;
margin: 10px 0;
border-radius: 10px;
}

/* ================= MOBILE ================= */
@media(max-width: 768px){
.sidebar, .right {
display: none;
}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>🤖 Agents</h2>

<div class="agent">GPT</div>
<div class="agent">Gemini</div>
<div class="agent">Claude</div>
<div class="agent">Perplexity</div>

</div>

<!-- CHAT -->
<div class="chat">

<div id="messages" class="messages"></div>

<div class="input-box">

<input id="input" placeholder="Ask Mythos AI...">

<button onclick="send()">Send</button>

<button onclick="startVoice()">🎤</button>

<input type="file" id="file">

</div>

</div>

<!-- RIGHT PANEL -->
<div class="right">

<h3>📊 Analytics</h3>

<div class="card">
Messages: <span id="msgCount">0</span>
</div>

<div class="card">
AI Mode: Smart
</div>

<div class="card">
Status: Online
</div>

</div>

<script>

/* ================= STATE ================= */
let msgCount = 0;

/* ================= ADD MESSAGE ================= */
function addMessage(text, type){

let div = document.createElement("div");

div.className = "msg " + type;

div.innerText = text;

document.getElementById("messages").appendChild(div);

document.getElementById("messages").scrollTop =
document.getElementById("messages").scrollHeight;

if(type === "user") {
msgCount++;
document.getElementById("msgCount").innerText = msgCount;
}

}

/* ================= TYPING EFFECT ================= */
function typingEffect(text, callback){

let i = 0;

let div = document.createElement("div");

div.className = "msg ai typing";

document.getElementById("messages").appendChild(div);

let interval = setInterval(()=>{

div.innerText = text.substring(0, i);

i++;

if(i > text.length){
clearInterval(interval);
div.classList.remove("typing");
callback && callback();
}

}, 20);

}

/* ================= SEND ================= */
function send(){

let input = document.getElementById("input");

let text = input.value;

if(!text) return;

addMessage(text, "user");

input.value = "";

/* fake streaming response */
setTimeout(()=>{

typingEffect("Thinking... processing AI response...", ()=>{

setTimeout(()=>{

addMessage("AI Response: " + text + " → processed successfully 🚀", "ai");

}, 500);

});

}, 300);

}

/* ================= VOICE INPUT ================= */
function startVoice(){

let SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Voice not supported");
return;
}

let recognition = new SpeechRecognition();

recognition.onresult = function(event){

let voiceText = event.results[0][0].transcript;

document.getElementById("input").value = voiceText;

};

recognition.start();

}

/* ================= FILE UPLOAD ================= */
document.getElementById("file").addEventListener("change", function(){

addMessage("File uploaded: " + this.files[0].name, "user");

});

</script>

</body>
  </html>
